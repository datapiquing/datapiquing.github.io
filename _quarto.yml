project:
  type: website
  render:
    - "*.qmd"
    - "blog/*.qmd"
    - "reports/*.qmd"
  resources:
    - robots.txt

lang: en

execute:
  freeze: auto

website:
  title: "datapiquing"
  description: "Garry Sykes - data science blog and reports"
  site-url: https://datapiquing.com
  navbar:
    left:
      - text: Home
        href: index.qmd
      - text: Blog
        href: blog/index.qmd
      - text: Reports
        href: reports/index.qmd
      - text: About
        href: about.qmd
  page-footer:
    center: "Copyright 2026, Garry Sykes"
    right:
      - icon: github
        href: https://github.com/datapiquing
  open-graph: true
  twitter-card: true

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: true
    code-copy: true
